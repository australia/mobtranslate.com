<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mob Translate">
  <defs>
    <linearGradient id="tile" x1="256" y1="0" x2="256" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C56A30"/>
      <stop offset="1" stop-color="#A04A1A"/>
    </linearGradient>
  </defs>
  <!-- Warm ochre tile -->
  <rect width="512" height="512" rx="116" fill="url(#tile)"/>

  <!-- Big speech bubble (one voice) -->
  <g>
    <rect x="78" y="126" width="300" height="172" rx="46" fill="#FFFFFF"/>
    <path d="M150 286 L132 356 L196 290 Z" fill="#FFFFFF"/>
  </g>

  <!-- Second speech bubble (the other voice / the translation) -->
  <g>
    <!-- ochre halo to separate from the white bubble where they meet -->
    <rect x="246" y="232" width="190" height="150" rx="50" fill="#A04A1A"/>
    <path d="M386 372 L406 432 L346 376 Z" fill="#A04A1A"/>
    <rect x="262" y="248" width="158" height="118" rx="40" fill="#F3A64B"/>
    <path d="M388 358 L402 402 L352 362 Z" fill="#F3A64B"/>
  </g>
</svg>
