[Service]
# Shared Hugging Face Space model registry used by the homepage hybrid route.
Environment=MOBTRANSLATE_HYBRID_SPACE_ENDPOINT=https://ajaxdavis-alpha-v0-historic.hf.space/v1/translate
Environment=MOBTRANSLATE_HYBRID_SPACE_TIMEOUT_MS=170000
Environment=MOBTRANSLATE_HYBRID_WARM_LANGUAGES=kuku_yalanji,migmaq
Environment=MOBTRANSLATE_HYBRID_KUKU_YALANJI_ENABLED=1
Environment=MOBTRANSLATE_HYBRID_KUKU_YALANJI_MODEL_ID=kuku-yalanji-nllb-lora
Environment=MOBTRANSLATE_HYBRID_KUKU_YALANJI_VERSION=v24.3-joint-lexeme-dose29-s3598-20260715
Environment=MOBTRANSLATE_HYBRID_KUKU_YALANJI_REVIEW_MODEL=gpt-5.4-mini-2026-03-17
Environment=MOBTRANSLATE_HYBRID_MIGMAQ_ENABLED=1
Environment=MOBTRANSLATE_HYBRID_MIGMAQ_MODEL_ID=migmaq-listuguj-nllb-lora
Environment=MOBTRANSLATE_HYBRID_MIGMAQ_VERSION=v3.3.0
Environment=MOBTRANSLATE_HYBRID_MIGMAQ_REVIEW_MODEL=gpt-5.4-mini-2026-03-17

# Legacy Kuku Yalanji v2 variables remain for older API routes during migration.
Environment=MOBTRANSLATE_HOMEPAGE_KUKU_MODEL_ENABLED=1
Environment=MOBTRANSLATE_TRANSLATE_V2_ENDPOINT=https://ajaxdavis-alpha-v0-historic.hf.space/v1/translate
Environment=MOBTRANSLATE_TRANSLATE_V2_TIMEOUT_MS=170000
Environment=MOBTRANSLATE_TRANSLATE_V2_MODEL_ID=kuku-yalanji-nllb-lora
Environment=MOBTRANSLATE_TRANSLATE_V2_VERSION=v24.3-joint-lexeme-dose29-s3598-20260715
Environment=MOBTRANSLATE_KUKU_REVIEW_MODEL=gpt-5.4-mini-2026-03-17
Environment=MOBTRANSLATE_KUKU_SPEECH_REPLY_ENABLED=0
Environment=MOBTRANSLATE_LABS_V2_ENDPOINT=
Environment=MOBTRANSLATE_LABS_V2_TIMEOUT_MS=55000
Environment=MOBTRANSLATE_LABS_MIGMAQ_ENDPOINT=
Environment=MOBTRANSLATE_LABS_MIGMAQ_TIMEOUT_MS=55000
